# ─────────────────────────────────────────────────────────────────────────────
# SpatiumAI — Docker Compose (Local Development)
# Starts all 6 containers: postgres, redis, api, worker, parser, ai
#
# Usage:
#   docker compose up              # start all services
#   docker compose up api parser   # start specific services
#   docker compose logs -f worker  # tail worker logs
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:
  # ── Data Layer ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: spatiumai-postgres
    environment:
      POSTGRES_DB: spatiumai
      POSTGRES_USER: spatiumai
      POSTGRES_PASSWORD: spatiumai_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatiumai -d spatiumai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: spatiumai-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder    # use builder stage in dev for hot reload
    container_name: spatiumai-api
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://spatiumai:spatiumai_dev_password@postgres:5432/spatiumai
      REDIS_URL: redis://redis:6379
      PARSER_SERVICE_URL: http://parser:8001
      AI_SERVICE_URL: http://ai:8002
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src   # hot reload
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npx", "tsx", "watch", "apps/api/src/server.ts"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: builder
    container_name: spatiumai-worker
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://spatiumai:spatiumai_dev_password@postgres:5432/spatiumai
      REDIS_URL: redis://redis:6379
      PARSER_SERVICE_URL: http://parser:8001
      AI_SERVICE_URL: http://ai:8002
      WORKER_CONCURRENCY: "5"
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser:
        condition: service_healthy
      ai:
        condition: service_healthy
    command: ["npx", "tsx", "watch", "apps/worker/src/worker.ts"]
    restart: unless-stopped

  parser:
    build:
      context: apps/parser
      dockerfile: Dockerfile
    container_name: spatiumai-parser
    env_file: .env
    environment:
      ENVIRONMENT: development
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - ./apps/parser/app:/app/app   # hot reload
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ai:
    build:
      context: apps/ai
      dockerfile: Dockerfile
    container_name: spatiumai-ai
    env_file: .env
    environment:
      ENVIRONMENT: development
      PORT: "8002"
    ports:
      - "8002:8002"
    volumes:
      - ./apps/ai/app:/app/app       # hot reload
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
