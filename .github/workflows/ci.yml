# ─────────────────────────────────────────────────────────────────────────────
# SpatiumAI — GitHub Actions CI Pipeline
# Triggered on: push to any branch, PR to main
# Steps: lint → typecheck → test → build (all apps in parallel)
# Fails fast: any step failure stops the pipeline
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Node.js Apps: api + worker ──────────────────────────────────────────────
  node-ci:
    name: Node.js (api + worker + shared)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: spatiumai_test
          POSTGRES_USER: spatiumai
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @spatiumai/shared build

      - name: Typecheck — shared
        run: pnpm --filter @spatiumai/shared typecheck

      - name: Typecheck — api
        run: pnpm --filter @spatiumai/api typecheck

      - name: Typecheck — worker
        run: pnpm --filter @spatiumai/worker typecheck

      - name: Test — api
        run: pnpm --filter @spatiumai/api test
        env:
          DATABASE_URL: postgresql://spatiumai:test_password@localhost:5432/spatiumai_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_for_ci_minimum_32_chars_required
          NODE_ENV: test
          PARSER_SERVICE_URL: http://localhost:8001
          AI_SERVICE_URL: http://localhost:8002

      - name: Test — worker
        run: pnpm --filter @spatiumai/worker test
        env:
          DATABASE_URL: postgresql://spatiumai:test_password@localhost:5432/spatiumai_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PARSER_SERVICE_URL: http://localhost:8001
          AI_SERVICE_URL: http://localhost:8002

      - name: Build — api
        run: pnpm --filter @spatiumai/api build

      - name: Build — worker
        run: pnpm --filter @spatiumai/worker build

  # ── Python Services: parser + ai ────────────────────────────────────────────
  python-ci:
    name: Python (parser + ai)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        service: [parser, ai]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r apps/${{ matrix.service }}/requirements.txt
        working-directory: ${{ github.workspace }}

      - name: Run tests
        run: |
          cd apps/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: ""
          AWS_S3_BUCKET: ""

  # ── Docker Build Smoke Test ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on PRs to main (expensive)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    strategy:
      matrix:
        service: [api, worker, parser, ai]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: spatiumai/${{ matrix.service }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
